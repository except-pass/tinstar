<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; border: none; display: block; background: #000; }
    iframe { width: 100%; height: 100%; border: none; display: block; }
    #error-overlay {
      display: none;
      position: absolute; inset: 0;
      background: #0a0a0f;
      color: #94a3b8;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 12px;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      z-index: 10;
    }
    #error-overlay.visible { display: flex; }
    #error-icon { font-size: 28px; opacity: 0.4; }
    #error-msg { color: #ef4444; max-width: 400px; text-align: center; line-height: 1.5; }
    #retry-btn {
      margin-top: 4px;
      padding: 6px 16px;
      background: rgba(0, 240, 255, 0.1);
      border: 1px solid rgba(0, 240, 255, 0.3);
      color: #00f0ff;
      font-family: inherit;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
    }
    #retry-btn:hover { background: rgba(0, 240, 255, 0.2); }
    #retry-count { color: #475569; font-size: 10px; }
  </style>
</head>
<body>
  <iframe id="term" allow="clipboard-read; clipboard-write"></iframe>
  <div id="error-overlay">
    <div id="error-icon">&#9632;</div>
    <div id="error-msg">Terminal connection failed</div>
    <button id="retry-btn" onclick="loadTerminal()">Retry</button>
    <div id="retry-count"></div>
  </div>
  <script>
    var params = new URLSearchParams(location.search)
    var session = params.get('session') || ''
    var port = params.get('port') || ''
    var termEl = document.getElementById('term')
    var errorOverlay = document.getElementById('error-overlay')
    var errorMsg = document.getElementById('error-msg')
    var retryCountEl = document.getElementById('retry-count')
    var loadAttempts = 0
    var maxAutoRetries = 3
    var loadTimer = null

    function showError(msg) {
      errorMsg.textContent = msg
      errorOverlay.classList.add('visible')
      termEl.style.display = 'none'
      retryCountEl.textContent = loadAttempts > 1 ? 'attempt ' + loadAttempts : ''
    }

    function hideError() {
      errorOverlay.classList.remove('visible')
      termEl.style.display = 'block'
    }

    function loadTerminal() {
      loadAttempts++
      hideError()
      if (loadTimer) { clearTimeout(loadTimer); loadTimer = null }

      // Resolve session/port URLs against the backend, not the wrapper's own origin.
      // In Tauri the wrapper is served from tauri://localhost, so a relative
      // '/s/SESSION/' would hit Tauri's protocol handler (returns index.html),
      // creating an inception of the whole app inside the terminal slot.
      // Read parent's __TINSTAR_API_BASE__ to find the real backend origin.
      var apiBase = ''
      try { apiBase = (window.parent && window.parent.__TINSTAR_API_BASE__) || '' } catch(e) {}

      if (session) {
        termEl.src = apiBase + '/s/' + session + '/'
      } else if (port) {
        // localhost won't work when the desktop app and backend are on different
        // machines; derive the host from apiBase when present.
        var host = 'localhost'
        if (apiBase) {
          try { host = new URL(apiBase).hostname } catch(e) {}
        }
        termEl.src = 'http://' + host + ':' + port + '/'
      } else {
        showError('No session or port specified')
        return
      }

      // If the iframe doesn't fire 'load' within 8s, something is wrong
      loadTimer = setTimeout(function() {
        // Check if iframe loaded anything useful
        try {
          var doc = termEl.contentDocument
          if (!doc || !doc.body || doc.body.innerHTML.length < 50) {
            handleLoadFailure('Terminal page did not load (timeout)')
          }
        } catch(e) {
          // Cross-origin means it DID load something — that's OK
        }
      }, 8000)
    }

    function handleLoadFailure(msg) {
      if (loadAttempts < maxAutoRetries) {
        retryCountEl.textContent = 'retrying... (' + loadAttempts + '/' + maxAutoRetries + ')'
        setTimeout(loadTerminal, 1500 * loadAttempts)
      } else {
        showError(msg || 'Terminal connection failed after ' + loadAttempts + ' attempts')
      }
    }

    termEl.addEventListener('load', function() {
      if (loadTimer) { clearTimeout(loadTimer); loadTimer = null }
      // Give xterm.js a moment to init, then verify content
      setTimeout(function() {
        try {
          var doc = termEl.contentDocument
          if (doc && doc.body) {
            var text = doc.body.textContent || ''
            // ttyd returns an HTML page; if body is empty or has error text, surface it
            if (text.indexOf('not found') !== -1 || text.indexOf('proxy error') !== -1) {
              handleLoadFailure('Session "' + session + '" not reachable: ' + text.trim().slice(0, 80))
              return
            }
          }
        } catch(e) {
          // Cross-origin = proxy worked and ttyd responded, which is good
        }
        hideError()
      }, 500)
    })

    termEl.addEventListener('error', function() {
      handleLoadFailure('Failed to load terminal iframe')
    })

    // Start loading
    loadTerminal()

    // ── Focus forwarding (unchanged) ──

    // Parent asks us to focus the xterm terminal
    window.addEventListener('message', function(e) {
      if (e.data && e.data.type === 'terminal-focus') {
        try {
          var win = termEl.contentWindow
          if (win && win.term && win.term.focus) {
            win.term.focus()
          } else {
            termEl.contentDocument && termEl.contentDocument.body &&
              termEl.contentDocument.body.dispatchEvent(new MouseEvent('click', { bubbles: true }))
          }
        } catch (_) {}
      }
    })

    // Intercept Ctrl+Shift+\ and notify parent to release terminal focus.
    var notifyEscapeLocked = false
    function notifyEscape() {
      if (notifyEscapeLocked) return
      notifyEscapeLocked = true
      setTimeout(function() { notifyEscapeLocked = false }, 500)
      window.parent.postMessage({ type: 'terminal-focus-toggle', sessionName: session }, '*')
    }

    window.addEventListener('keydown', function(e) {
      if (e.code === 'Backslash' && (e.ctrlKey || e.metaKey) && e.shiftKey) {
        e.preventDefault()
        notifyEscape()
      }
    })

    // Layer 2a: xterm.js custom key handler
    function tryAttachXterm() {
      try {
        var win = termEl.contentWindow
        if (!win || !win.term || !win.term.attachCustomKeyEventHandler) return false
        win.term.attachCustomKeyEventHandler(function(e) {
          if (e.type !== 'keydown') return true
          if (e.code === 'Backslash' && (e.ctrlKey || e.metaKey) && e.shiftKey) {
            notifyEscape()
            return false
          }
          // Ctrl+V: suppress xterm's \x16 so the browser fires a paste event instead
          if (e.code === 'KeyV' && (e.ctrlKey || e.metaKey) && !e.shiftKey && !e.altKey) {
            return false
          }
          return true
        })
        return true
      } catch (_) { return false }
    }

    // Layer 2b: capture-phase DOM listener (fallback)
    function tryAttachKeydown() {
      try {
        termEl.contentWindow.addEventListener('keydown', function(e) {
          if (e.code === 'Backslash' && (e.ctrlKey || e.metaKey) && e.shiftKey) {
            e.preventDefault()
            e.stopPropagation()
            notifyEscape()
          }
          // Ctrl+V: read clipboard and paste into terminal
          if (e.code === 'KeyV' && (e.ctrlKey || e.metaKey) && !e.shiftKey && !e.altKey) {
            e.preventDefault()
            e.stopPropagation()
            navigator.clipboard.readText().then(function(text) {
              if (!text) return
              try {
                var win = termEl.contentWindow
                if (win && win.term) {
                  if (typeof win.term.paste === 'function') win.term.paste(text)
                  else win.term.input(text, true)
                }
              } catch(err) {}
            }).catch(function() {})
          }
        }, true)
        return true
      } catch (_) { return false }
    }

    termEl.addEventListener('load', function() {
      tryAttachKeydown()
      var attempts = 0
      var timer = setInterval(function() {
        if (tryAttachXterm() || ++attempts > 30) clearInterval(timer)
      }, 100)
    })
  </script>
</body>
</html>
