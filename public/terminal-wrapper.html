<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, iframe { width: 100%; height: 100%; border: none; display: block; }
  </style>
</head>
<body>
  <iframe id="term" allow="clipboard-read; clipboard-write"></iframe>
  <script>
    // Read session URL from query param
    const params = new URLSearchParams(location.search)
    const session = params.get('session') ?? ''
    const port = params.get('port') ?? ''
    if (session) {
      // Route through Caddy proxy at /s/<session>/ — works for local and remote access
      document.getElementById('term').src = `/s/${session}/`
    } else if (port) {
      // Fallback: direct ttyd port (local only)
      document.getElementById('term').src = `http://localhost:${port}/s/${session}/`
    }

    // Parent asks us to focus the xterm terminal (e.g. after Ctrl+\ keyboard shortcut).
    // iframe.focus() alone puts browser focus on this wrapper window but doesn't reach
    // xterm's internal textarea — term.focus() bridges that gap.
    window.addEventListener('message', function(e) {
      if (e.data?.type === 'terminal-focus') {
        try {
          var win = termEl.contentWindow
          if (win && win.term && win.term.focus) {
            win.term.focus()
          } else {
            // xterm not ready yet — dispatch a click so the browser propagates focus naturally
            termEl.contentDocument && termEl.contentDocument.body &&
              termEl.contentDocument.body.dispatchEvent(new MouseEvent('click', { bubbles: true }))
          }
        } catch (_) {}
      }
    })

    // Intercept Ctrl+Shift+\ and notify parent to release terminal focus.
    // Lock prevents double-fire when both the wrapper-window listener (Layer 1)
    // and the inner-iframe capture listener (Layer 2) fire for the same keypress.
    var notifyEscapeLocked = false
    function notifyEscape() {
      if (notifyEscapeLocked) return
      notifyEscapeLocked = true
      setTimeout(function() { notifyEscapeLocked = false }, 500)
      window.parent.postMessage({ type: 'terminal-focus-toggle', sessionName: session }, '*')
    }

    // Layer 1: wrapper window — catches the key when focus is not yet in the terminal
    window.addEventListener('keydown', function(e) {
      if (e.code === 'Backslash' && (e.ctrlKey || e.metaKey) && e.shiftKey) {
        e.preventDefault()
        notifyEscape()
      }
    })

    var termEl = document.getElementById('term')

    // Layer 2a: xterm.js custom key handler (most reliable — runs before xterm.js
    // processes the key and before DOM capture/bubble, so can't be stopped by xterm.js)
    function tryAttachXterm() {
      try {
        var win = termEl.contentWindow
        if (!win || !win.term || !win.term.attachCustomKeyEventHandler) return false
        win.term.attachCustomKeyEventHandler(function(e) {
          if (e.type !== 'keydown') return true
          if (e.code === 'Backslash' && (e.ctrlKey || e.metaKey) && e.shiftKey) {
            notifyEscape()
            return false // tell xterm.js to ignore this key
          }
          return true
        })
        return true
      } catch (_) { return false }
    }

    // Layer 2b: capture-phase DOM listener (fallback if window.term isn't available)
    function tryAttachKeydown() {
      try {
        termEl.contentWindow.addEventListener('keydown', function(e) {
          if (e.code === 'Backslash' && (e.ctrlKey || e.metaKey) && e.shiftKey) {
            e.preventDefault()
            e.stopPropagation()
            notifyEscape()
          }
        }, true)
        return true
      } catch (_) { return false }
    }

    termEl.addEventListener('load', function() {
      tryAttachKeydown() // attach immediately as fallback
      // Retry xterm handler until window.term is ready (xterm.js initialises after 'load')
      var attempts = 0
      var timer = setInterval(function() {
        if (tryAttachXterm() || ++attempts > 30) clearInterval(timer)
      }, 100)
    })
  </script>
</body>
</html>
