# Dedicated tmux config for Tinstar's isolated tmux server
# Keep this minimal and free of plugins or run-shell hooks to avoid side effects

# Usability tweaks (safe defaults)
set -g mouse on
set -g history-limit 200000
set -g base-index 1
setw -g pane-base-index 1
set -g status on
set -g default-terminal "tmux-256color"

# Do NOT add TPM/plugins or any run-shell/background commands here

