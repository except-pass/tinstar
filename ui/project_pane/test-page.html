<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Pane Test</title>
    <link rel="stylesheet" href="./ProjectPane.css">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/react-arborist@3.4.0/dist/index.umd.js"></script>
</head>
<body>
    <div id="root"></div>
    
    <!-- Mock API responses for testing -->
    <script>
        // Mock fetch for testing
        const originalFetch = window.fetch;
        window.fetch = function(url, options) {
            console.log('Mock API call:', url, options);
            
            // Mock projects API
            if (url === '/api/projects' && (!options || options.method === 'GET')) {
                return Promise.resolve({
                    ok: true,
                    json: () => Promise.resolve({
                        success: true,
                        projects: [
                            {
                                name: 'test-project-1',
                                path: '/path/to/project1',
                                created_at: '2024-01-01T00:00:00Z',
                                unignore_paths: ['src/config.json', '.env.local']
                            },
                            {
                                name: 'test-project-2',
                                path: '/path/to/project2', 
                                created_at: '2024-01-02T00:00:00Z',
                                unignore_paths: []
                            }
                        ]
                    })
                });
            }
            
            // Mock filelist API
            if (url.includes('/api/filelist/') && url.includes('/tree')) {
                return Promise.resolve({
                    ok: true,
                    json: () => Promise.resolve({
                        tree: {
                            type: 'directory',
                            path: 'src',
                            name: 'src',
                            id: 'src',
                            children: [
                                {
                                    type: 'file',
                                    path: 'src/App.tsx',
                                    name: 'App.tsx',
                                    size: 1024,
                                    modified: '2024-01-01T10:00:00Z',
                                    stats: { lines_added: 10, lines_removed: 2, is_tracked: true },
                                    id: 'src/App.tsx'
                                }
                            ],
                            stats: { lines_added: 10, lines_removed: 2 }
                        }
                    })
                });
            }
            
            // Mock editor API
            if (url === '/api/editor/open') {
                return Promise.resolve({
                    ok: true,
                    json: () => Promise.resolve({ success: true })
                });
            }
            
            // Mock project update API
            if (url.includes('/api/projects/') && options?.method === 'PUT') {
                return Promise.resolve({
                    ok: true,
                    json: () => Promise.resolve({
                        success: true,
                        project: {
                            name: 'test-project-1',
                            path: '/path/to/project1',
                            created_at: '2024-01-01T00:00:00Z',
                            unignore_paths: JSON.parse(options.body).unignore_paths
                        }
                    })
                });
            }
            
            // Mock project delete API
            if (url.includes('/api/projects/') && options?.method === 'DELETE') {
                return Promise.resolve({
                    ok: true,
                    json: () => Promise.resolve({ success: true })
                });
            }
            
            // Default fallback
            return originalFetch.apply(this, arguments);
        };
    </script>

    <!-- Load our components as ES modules -->
    <script type="module">
        // Simple inline components for testing
        const { useState, useEffect } = React;
        const { createRoot } = ReactDOM;
        
        // Mock FileTree component
        const FileTree = ({ projectName, onFileOpen }) => {
            const [loading, setLoading] = useState(true);
            const [data, setData] = useState([]);
            
            useEffect(() => {
                fetch(`/api/filelist/${projectName}/tree`, { method: 'POST', body: JSON.stringify({ open_dirs: [] }) })
                    .then(r => r.json())
                    .then(d => {
                        setData([d.tree]);
                        setLoading(false);
                    });
            }, [projectName]);
            
            if (loading) return React.createElement('div', null, 'Loading...');
            
            const renderNode = (node) => {
                return React.createElement('div', 
                    { 
                        key: node.id,
                        style: { marginLeft: '20px', padding: '2px 0' },
                        className: 'file-entry'
                    },
                    node.name,
                    node.type === 'file' && React.createElement('button', {
                        onClick: () => onFileOpen && onFileOpen(node.path),
                        style: { marginLeft: '8px' },
                        title: 'Open in editor'
                    }, '✏️')
                );
            };
            
            return React.createElement('div', 
                { className: 'file-tree-container' },
                data.map(renderNode)
            );
        };
        
        // Test ProjectPane implementation
        const TestProjectPane = () => {
            const [projects, setProjects] = useState([]);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            
            const fetchProjects = async () => {
                try {
                    setLoading(true);
                    const response = await fetch('/api/projects');
                    const data = await response.json();
                    setProjects(data.projects || []);
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            };
            
            useEffect(() => {
                fetchProjects();
            }, []);
            
            const handleNewProject = () => {
                console.log('New project clicked - would open directory picker');
            };
            
            const handleClose = async (name) => {
                await fetch(`/api/projects/${name}`, { method: 'DELETE' });
                setProjects(prev => prev.filter(p => p.name !== name));
            };
            
            const colors = ['#C6A77B', '#8B5A2B', '#A04020', '#4B4B4B', '#D4AF37', '#556B2F', '#9AB6C3', '#2E1B0F'];
            
            return React.createElement('div', 
                { className: 'project-pane' },
                loading && React.createElement('div', { className: 'project-pane__loading' }, 'Loading projects...'),
                error && React.createElement('div', 
                    { className: 'project-pane__error' },
                    error,
                    React.createElement('button', {
                        className: 'project-pane__error-dismiss',
                        onClick: () => setError(null)
                    }, '✕')
                ),
                React.createElement('div', 
                    { className: 'project-pane__projects' },
                    projects.map((project, index) =>
                        React.createElement('div',
                            {
                                key: project.name,
                                className: 'project-widget',
                                style: { backgroundColor: colors[index % colors.length] }
                            },
                            React.createElement('div',
                                { className: 'project-widget__header' },
                                React.createElement('span', { className: 'project-widget__name' }, project.name),
                                React.createElement('div',
                                    { className: 'project-widget__controls' },
                                    React.createElement('button', {
                                        className: 'project-widget__button project-widget__refresh',
                                        onClick: fetchProjects,
                                        title: 'Refresh file list'
                                    }, '↻'),
                                    React.createElement('button', {
                                        className: 'project-widget__button project-widget__settings',
                                        title: 'Project settings'
                                    }, '⚙'),
                                    React.createElement('button', {
                                        className: 'project-widget__button project-widget__close',
                                        onClick: () => handleClose(project.name),
                                        title: 'Close project'
                                    }, '✕')
                                )
                            ),
                            React.createElement('div',
                                { className: 'project-widget__content' },
                                React.createElement(FileTree, {
                                    projectName: project.name,
                                    onFileOpen: (path) => console.log('Open file:', path)
                                })
                            )
                        )
                    )
                ),
                React.createElement('button',
                    {
                        className: 'project-pane__new-project',
                        onClick: handleNewProject
                    },
                    '+ New Project'
                )
            );
        };
        
        // Render the component
        const root = createRoot(document.getElementById('root'));
        root.render(React.createElement(TestProjectPane));
        
        // Expose for testing
        window.TestProjectPane = TestProjectPane;
        window.React = React;
        window.ReactDOM = ReactDOM;
    </script>
</body>
</html>
