<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Real Test</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { createRoot } = ReactDOM;

        const API_BASE_URL = 'http://localhost:3002';

        const App = () => {
            const [projects, setProjects] = useState([]);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);

            const fetchProjects = async () => {
                setLoading(true);
                setError(null);
                
                try {
                    console.log('Fetching projects...');
                    const response = await fetch(`${API_BASE_URL}/api/projects`);
                    
                    if (!response.ok) {
                        throw new Error(`Failed to fetch projects: ${response.statusText}`);
                    }
                    
                    const data = await response.json();
                    console.log('Projects received:', data);
                    
                    if (data.success && data.projects) {
                        setProjects(data.projects);
                    } else {
                        setError(data.message || 'Failed to load projects');
                    }
                } catch (err) {
                    console.error('Error:', err);
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            };

            const handleNewProject = () => {
                alert('New Project button clicked! (Real functionality would be implemented here)');
            };

            useEffect(() => {
                fetchProjects();
            }, []);

            return (
                <div style={{ padding: '20px', fontFamily: 'Arial, sans-serif' }}>
                    <h1>Tinstar - Real Integration Test</h1>
                    
                    {loading && <p>Loading projects...</p>}
                    {error && <p style={{ color: 'red' }}>Error: {error}</p>}
                    
                    <button 
                        onClick={handleNewProject}
                        style={{
                            backgroundColor: '#007bff',
                            color: 'white',
                            border: 'none',
                            padding: '10px 20px',
                            borderRadius: '5px',
                            cursor: 'pointer',
                            marginBottom: '20px'
                        }}
                    >
                        + New Project
                    </button>
                    
                    <div>
                        <h3>Projects ({projects.length}):</h3>
                        {projects.length === 0 ? (
                            <p>No projects found</p>
                        ) : (
                            <ul>
                                {projects.map(project => (
                                    <li key={project.name}>
                                        <strong>{project.name}</strong> - {project.path}
                                    </li>
                                ))}
                            </ul>
                        )}
                    </div>
                    
                    <div style={{ marginTop: '20px', padding: '10px', backgroundColor: '#f0f0f0' }}>
                        <strong>✅ Real API Integration:</strong>
                        <ul>
                            <li>Uses real tinstar API on port 3002</li>
                            <li>Fetches actual project data</li>
                            <li>New Project button ready for implementation</li>
                        </ul>
                    </div>
                </div>
            );
        };

        // Render the app
        const root = createRoot(document.getElementById('root'));
        root.render(<App />);

        console.log('Minimal real test app loaded!');
    </script>
</body>
</html>
