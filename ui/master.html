<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tinstar - Master UI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background-color: #f5f5f5;
            overflow: hidden;
        }
        
        #root {
            width: 100vw;
            height: 100vh;
        }
        
        /* Loading state */
        .loading-container {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f5f5f5;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e9ecef;
            border-left: 4px solid #007bff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loading-text {
            margin-left: 16px;
            font-size: 16px;
            color: #6c757d;
        }
        
        /* Error state */
        .error-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f5f5f5;
            padding: 20px;
        }
        
        .error-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        
        .error-title {
            font-size: 24px;
            font-weight: 600;
            color: #dc3545;
            margin-bottom: 8px;
        }
        
        .error-message {
            font-size: 16px;
            color: #6c757d;
            text-align: center;
            max-width: 500px;
            line-height: 1.5;
        }
        
        .error-actions {
            margin-top: 24px;
        }
        
        .error-button {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.15s ease;
        }
        
        .error-button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div id="root">
        <div class="loading-container">
            <div class="loading-spinner"></div>
            <div class="loading-text">Loading Tinstar...</div>
        </div>
    </div>
    
    <script>
        // Error handling for module loading
        window.addEventListener('error', function(e) {
            console.error('Loading error:', e);
            const root = document.getElementById('root');
            root.innerHTML = `
                <div class="error-container">
                    <div class="error-icon">⚠️</div>
                    <div class="error-title">Failed to Load Tinstar</div>
                    <div class="error-message">
                        There was an error loading the application. Please check the console for details
                        and ensure all dependencies are properly installed.
                    </div>
                    <div class="error-actions">
                        <button class="error-button" onclick="window.location.reload()">
                            Reload Page
                        </button>
                    </div>
                </div>
            `;
        });
        
        // Check if APIs are available
        const checkAPIs = async () => {
            try {
                const checks = [
                    fetch('/api/sessions').catch(() => ({ ok: false, status: 'Connection failed' })),
                    fetch('/api/projects').catch(() => ({ ok: false, status: 'Connection failed' })),
                    fetch('/api/events').catch(() => ({ ok: false, status: 'Connection failed' }))
                ];
                
                const results = await Promise.all(checks);
                const failedAPIs = results.filter(r => !r.ok);
                
                if (failedAPIs.length > 0) {
                    console.warn('Some APIs are not responding:', failedAPIs);
                    // You might want to show a warning banner in the UI
                }
            } catch (error) {
                console.warn('API health check failed:', error);
            }
        };
        
        // Run API check after a short delay
        setTimeout(checkAPIs, 1000);
    </script>
    
    <script type="module" src="/master.tsx"></script>
</body>
</html>
