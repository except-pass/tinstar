name: CI

# Ratchet: the tsc baseline was driven to zero (see docs/testing.md). This gate
# fails the build on ANY new type error so it can't regrow, and runs the unit
# suite. Keep it green — if you must add a type error, fix it, don't widen this.
on:
  push:
    branches: ['**']
  pull_request:

jobs:
  typecheck-and-test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Catches case-only filename collisions that build on this Linux runner but
      # break module resolution on the macOS/Windows release runners — the silent
      # failure mode that blocked the v5.2.0 release. See docs/releasing.md.
      - name: Case-collision guard
        run: npm run check:case

      - name: Typecheck (tsc must report zero errors)
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit
