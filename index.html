<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tinstar — Infinite Canvas</title>
    <script type="importmap">
{
  "imports": {
    "@tinstar/plugin-api": "/api/plugin-runtime/api.js",
    "react": "/api/plugin-runtime/react.js"
  }
}
</script>
    <link rel="icon" href="/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  </head>
  <body class="bg-surface-base text-slate-100 font-display antialiased">
    <div id="root"></div>
    <!--
      Runtime API base injection point.
      Empty in browser mode (frontend uses same-origin /api/*).
      In Tauri the shell sets window.__TINSTAR_API_BASE__ via initialization_script
      BEFORE this inline runs, so we must only assign when undefined — otherwise
      we'd stomp the Tauri value back to empty.
      Contract: window.__TINSTAR_API_BASE__ is a full origin string (no trailing slash) or ''.
    -->
    <script>if(typeof window.__TINSTAR_API_BASE__==='undefined')window.__TINSTAR_API_BASE__='';</script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
